function submitGuru() {
  let rowIndex = document.getElementById('gRowIndexHidden').value;
  let groups   = getMapelGroupsData();

  // Validate groups
  if (groups.length === 0) { tampilkanToast('Tambahkan minimal 1 mata pelajaran!', 'warning'); return; }
  for (let i = 0; i < groups.length; i++) {
    let g = groups[i];
    if (!g.mapel)                 { tampilkanToast('Mata Pelajaran #' + (i+1) + ' kosong!', 'warning'); return; }
    if (g.kelasArr.length === 0)  { tampilkanToast('Pilih minimal 1 kelas untuk Mata Pelajaran #' + (i+1) + '!', 'warning'); return; }
    if (!isMapelInDatalist(g.mapel)) { tampilkanToast('\u26a0\ufe0f "' + g.mapel + '" bukan mata pelajaran valid! Pilih dari suggestion.', 'warning'); return; }
  }

  let payload;
  let fnCall;
  if (currentEditGuruId) {
    // Edit SELURUH guru (replace semua mapel)
    payload = {
      idGuru     : currentEditGuruId,
      namaBaru   : document.getElementById('gNamaBaru').value.trim(),
      mapelGroups: groups
    };
    if (!payload.namaBaru) { tampilkanToast('Nama guru wajib diisi!', 'warning'); return; }
    fnCall = 'updateGuruLengkap';
  } else if (rowIndex) {
    // Edit mode — single group (legacy)
    payload = {
      rowIndex : rowIndex,
      namaBaru : document.getElementById('gNamaBaru').value.trim(),
      mapel    : groups[0].mapel,
      kelasArr : groups[0].kelasArr
    };
    fnCall = 'simpanGuru';
  } else {
    // New / Existing mode — multi-group payload
    let mode = document.querySelector('input[name="gMode"]:checked').value;
    payload = { mapelGroups: groups };
    if (mode === 'new') {
      payload.namaBaru = document.getElementById('gNamaBaru').value.trim();
      payload.idGuru   = '';
      if (!payload.namaBaru) { tampilkanToast('Nama guru wajib diisi!', 'warning'); return; }
    } else {
      if (!isValidComboValue('gGuruSearch')) { tampilkanToast('\u26a0\ufe0f Guru tidak valid! Pilih dari daftar suggestion.','warning'); return; }
      payload.idGuru = document.getElementById('gGuruSearch').value.split(' - ')[0].trim();
      if (!payload.idGuru) { tampilkanToast('Pilih guru yang sudah ada!', 'warning'); return; }
    }
  }

  setTombolLoading('btnSimpanGuru', true, 'Menyimpan...');
  tampilkanLoading('Menyimpan data guru...');
  let runner = google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanGuru', false, '', 'Simpan', 'btn btn-primary w-100 fw-bold py-2');
      let tipe = res.includes('\u2705') ? 'success' : 'warning';
      tampilkanToast(res, tipe);
      if (tipe === 'success') { bsModalGuru.hide(); resetFormGuruKeDefault(); guruDataLoaded = false; fetchGuruData(); }
    })
    .withFailureHandler(err => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanGuru', false, '', 'Simpan', 'btn btn-primary w-100 fw-bold py-2');
      tampilkanToast('\u274c Error: ' + err.message, 'error');
    });
  if (currentEditGuruId) runner.updateGuruLengkap(payload);
  else runner.simpanGuru(payload);
}

// Helper: cek mapel ada di datalist gMapelOptions (validation per group)
function isMapelInDatalist(val) {
  if (!val) return false;
  let dl = document.getElementById('gMapelOptions');
  if (!dl) return true;  // datalist tidak ada → skip
  let opts = dl.querySelectorAll('option');
  for (let opt of opts) {
    if (opt.value.toLowerCase() === val.toLowerCase()) return true;
  }
  return false;
}

// ── MULTI-GROUP MAPEL helpers ──
let _gGroupCounter = 0;

// Generate satu group HTML
function generateMapelGroupHTML(idx, mapel, checkedArr) {
  mapel = mapel || '';
  checkedArr = checkedArr || [];
  let showRemove = (idx > 0);
  return `<div class="mapel-group mb-3 p-3 rounded-3" data-idx="${idx}" style="background:#f8fafc;border:1px solid #e2e8f0;">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="small fw-bold" style="color:#3b82f6;letter-spacing:0.3px;"><i class="fas fa-book me-1"></i>Mata Pelajaran ${idx + 1}</span>
      ${showRemove ? `<button type="button" class="btn btn-sm btn-link text-danger p-0" onclick="removeMapelGroup(${idx})" style="font-size:11px;text-decoration:none;"><i class="fas fa-times me-1"></i>Hapus</button>` : ''}
    </div>
    <div class="mb-2">
      <input list="gMapelOptions" type="text" class="form-control gMapelInput" data-idx="${idx}" placeholder="Ketik / pilih mata pelajaran..." autocomplete="off" value="${mapel}">
    </div>
    <label class="small fw-bold text-muted mb-2 d-block">Pilih Kelas <span class="text-danger">*</span></label>
    <div id="gKelasContainer-${idx}" class="p-2 border rounded-3 bg-white" style="max-height:180px;overflow-y:auto;"></div>
  </div>`;
}

// Initialize/populate semua groups
function generateGuruMapelGroups(groupsData) {
  groupsData = (groupsData && groupsData.length > 0) ? groupsData : [{ mapel: '', kelasArr: [] }];
  let html = '';
  groupsData.forEach((g, idx) => { html += generateMapelGroupHTML(idx, g.mapel, g.kelasArr); });
  document.getElementById('gMapelGroupsContainer').innerHTML = html;
  _gGroupCounter = groupsData.length - 1;
  groupsData.forEach((g, idx) => generateKelasPillsForGroup(g.kelasArr, idx));
}

// Generate kelas pill toggles untuk container spesifik group
function generateKelasPillsForGroup(checkedArr, groupIdx) {
  let container = document.getElementById('gKelasContainer-' + groupIdx);
  if (!container) return;
  checkedArr = checkedArr || [];
  // Normalisasi checkedArr ke tingkat (supaya data lama berbasis rombel tetap kebaca tercentang)
  let checkedTingkat = checkedArr.map(c => getTingkatFromRombel(c).toLowerCase());
  let html = '';
  getJenjangTingkatStruct().forEach(jenjang => {
    html += `<div class="mb-2">
      <span class="small fw-bold text-uppercase" style="color:#64748b;letter-spacing:0.8px;font-size:10px;">${jenjang.nama}</span>
      <div class="d-flex flex-wrap gap-1 mt-1">`;
    jenjang.daftar.forEach(tingkat => {
      let id = `gChk-${groupIdx}-` + tingkat.toString().replace(/\s/g, '-');
      let on = checkedTingkat.includes(tingkat.toLowerCase());
      let label = 'Tingkat ' + tingkat;
      html += `
        <input type="checkbox" class="chk-guru-kelas" data-group="${groupIdx}" value="${tingkat}" id="${id}" ${on?'checked':''} style="position:absolute;left:-9999px;">
        <span class="kelas-pill" data-target="${id}" onclick="toggleKelasPill(this)" data-on="${on}"
              style="display:inline-block;padding:4px 10px;border-radius:16px;cursor:pointer;
                     background:${on?'#3b82f6':'#f8fafc'};color:${on?'#fff':'#475569'};
                     border:1px solid ${on?'#3b82f6':'#cbd5e1'};font-size:11px;
                     font-weight:600;transition:all .15s;user-select:none;">${label}</span>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

// Struktur jenjang → daftar tingkat (distinct), untuk pills guru
function getJenjangTingkatStruct() {
  let map = {}, order = [];
  if (rawKelas && rawKelas.length > 0) {
    rawKelas.forEach(k => {
      if (!map[k.jenjang]) { map[k.jenjang] = new Set(); order.push(k.jenjang); }
      if (k.tingkat) map[k.jenjang].add(k.tingkat.toString());
    });
  } else {
    jenjangSistem.forEach(j => {
      if (!map[j.nama]) { map[j.nama] = new Set(); order.push(j.nama); }
      j.daftar.forEach(rb => map[j.nama].add(getTingkatFromRombel(rb).toString()));
    });
  }
  return order.map(j => ({
    nama: j,
    daftar: [...map[j]].sort((a,b) => {
      let na = parseInt(a), nb = parseInt(b);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      return a.localeCompare(b);
    })
  }));
}

// Tombol "+ Tambah Mata Pelajaran"
function addMapelGroup() {
  _gGroupCounter++;
  let idx = _gGroupCounter;
  document.getElementById('gMapelGroupsContainer').insertAdjacentHTML('beforeend', generateMapelGroupHTML(idx, '', []));

function removeMapelGroup(idx) {

// Collect data dari semua groups
function getMapelGroupsData() {
  let groups = [];
  document.querySelectorAll('#gMapelGroupsContainer .mapel-group').forEach(groupEl => {
    let idx = parseInt(groupEl.dataset.idx);
    let mapelInput = groupEl.querySelector('.gMapelInput');
    let mapel = mapelInput ? mapelInput.value.trim() : '';
    let kelasArr = [];
    document.querySelectorAll(`#gKelasContainer-${idx} .chk-guru-kelas:checked`).forEach(cb => kelasArr.push(cb.value));
    groups.push({ mapel, kelasArr });
  });
  return groups;
}

  // Set kelas DULU, trigger filter mapel, baru set ruangan/mapel/guru via setSelectValueSafe

function hitungDurasi() {
  let a = document.getElementById('sJamMulai').value;
  let b = document.getElementById('sJamBerakhir').value;
  if (!a || !b) { document.getElementById('sDurasi').value = ''; return; }
  let [h1, m1] = a.split(':').map(Number);
  let [h2, m2] = b.split(':').map(Number);
  let m = (h2 * 60 + m2) - (h1 * 60 + m1);
  if (m <= 0) { document.getElementById('sDurasi').value = ''; return; }
  document.getElementById('sDurasi').value = (Math.floor(m / 60) > 0 ? Math.floor(m / 60) + ' jam ' : '') + (m % 60 > 0 ? m % 60 + ' menit' : '');
}
function onGuruSearchChange() {

  document.getElementById('sNamaGuru').value = rows.length > 0 ? rows[0].nama : '';
  let mapels = [...new Set(rows.map(g => g.mapel))];
  if (mapels.length > 0) {
    document.getElementById('sMapelOptions').innerHTML = mapels.map(m => '<option value="' + m + '">').join('');
  }
  autoFillHonorSesi();
}

// Entry point baru: dipanggil dari list jadwal guru di tab Isi Absensi
function bukaModalIsiAbsensi(s) {
  if (!s) { tampilkanToast('Data jadwal kosong', 'warning'); return; }

  let rombel = s.kelas;
  let siswaRombel = rawSiswa.filter(x => (x.kelas||'').toLowerCase() === rombel.toLowerCase() && x.status === 'Aktif');
  let tglStr = (s.tgl||'').split('T')[0];

  absensiSesiSaatIni = {
    tanggal : tglStr, rombel: rombel, mapel: s.mapel,
    jamMulai: s.jamMulai, idGuru: s.idGuru, namaGuru: s.namaGuru,
    siswaList: siswaRombel
  };

  document.getElementById('absensiSesiInfo').innerHTML =
    '<strong>' + s.mapel + '</strong> \u00b7 ' + rombel +
    ' \u00b7 ' + tglStr + ' \u00b7 ' + s.jamMulai +
    ' \u00b7 Guru: ' + (s.namaGuru || '-');
  document.getElementById('absensiCounter').innerText = siswaRombel.length + ' siswa';

  // Reset materi + nilai toggle
  document.getElementById('absMateri').value = '';
  document.getElementById('absToggleNilai').checked = false;

  let emptyEl = document.getElementById('absensiEmptyState');
  let wrapEl  = document.getElementById('absensiTableWrap');

    wrapEl.classList.add('d-none');
    btnSimpan.disabled = true;
    document.getElementById('tabelAbsensiBody').innerHTML = '';
    initModalAbsensi();
    bsModalAbsensi.show();
    return;
  }
  emptyEl.classList.add('d-none');
  wrapEl.classList.remove('d-none');
  btnSimpan.disabled = false;

  renderAbsensiRows(siswaRombel, {});
  initModalAbsensi();
  bsModalAbsensi.show();

  // Load existing absensi
  tampilkanLoading('Memuat absensi sebelumnya...');
  google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      if (!res) return;
      let entries = res.entries || [];
      let materi = res.materi || '';
      let adaNilai = !!res.adaNilai;
      if (materi) document.getElementById('absMateri').value = materi;
      if (adaNilai) {
        document.getElementById('absToggleNilai').checked = true;
        toggleNilaiAbsensi();
      }
      if (entries.length > 0) {
        let map = {};
        entries.forEach(e => { map[e.idSiswa] = e; });
        renderAbsensiRows(siswaRombel, map);
        tampilkanToast('\u2139\ufe0f Memuat ' + entries.length + ' data absensi yang sudah ada', 'info');
      }
    })
    .withFailureHandler(err => { sembunyikanLoading(); tampilkanToast('\u26a0\ufe0f ' + err.message, 'warning'); })
    .getAbsensiSesi(tglStr, rombel, s.jamMulai);
}

function renderAbsensiRows(siswaList, existingMap) {
  let opts = ['Hadir','Izin','Sakit','Alpha'];
  let nilaiVisible = document.getElementById('absToggleNilai').checked;
  let html = '';
  siswaList.forEach(siswa => {
    let existing = existingMap[siswa.id] || { status: 'Hadir', catatan: '', nilai: '' };
    let selectOpts = opts.map(o => `<option value="${o}" ${o===existing.status?'selected':''}>${o}</option>`).join('');
    let nilaiVal = (existing.nilai !== '' && existing.nilai !== null && existing.nilai !== undefined) ? existing.nilai : '';
    html += `<tr data-id="${siswa.id}">
      <td><div class="fw-bold">${siswa.nama}</div><div class="text-muted small">${siswa.id}</div></td>
      <td><select class="form-select form-select-sm absensi-status" onchange="onAbsensiStatusChange(this)">${selectOpts}</select></td>
      <td><input type="text" class="form-control form-control-sm absensi-catatan" placeholder="Telat 10 mnt, dll" value="${(existing.catatan||'').replace(/"/g,'&quot;')}"></td>
      <td class="col-nilai ${nilaiVisible?'':'d-none'}"><input type="number" min="0" max="100" class="form-control form-control-sm absensi-nilai" placeholder="0-100" value="${nilaiVal}"></td>
    </tr>`;
  });
  let tbody = document.getElementById('tabelAbsensiBody');
  tbody.innerHTML = html;
  tbody.querySelectorAll('.absensi-status').forEach(s => applyAbsensiStatusColor(s));
}

function toggleNilaiAbsensi() {
  let on = document.getElementById('absToggleNilai').checked;
  document.querySelectorAll('#tabelAbsensiBody .col-nilai, #modalAbsensi .col-nilai').forEach(el => {
    el.classList.toggle('d-none', !on);
  });
}

function applyAbsensiStatusColor(selectEl) {
  let v = selectEl.value;
  selectEl.classList.remove('border-success','border-warning','border-info','border-danger','text-success','text-warning','text-info','text-danger','fw-bold');
  selectEl.classList.add('fw-bold');
  if (v === 'Hadir') selectEl.classList.add('border-success','text-success');
  else if (v === 'Izin') selectEl.classList.add('border-info','text-info');
  else if (v === 'Sakit') selectEl.classList.add('border-warning','text-warning');
  else if (v === 'Alpha') selectEl.classList.add('border-danger','text-danger');
}

function onAbsensiStatusChange(selectEl) { applyAbsensiStatusColor(selectEl); }

function setSemuaAbsensi(status) {
  document.querySelectorAll('#tabelAbsensiBody .absensi-status').forEach(s => {
    s.value = status;
    applyAbsensiStatusColor(s);
  });
}

function submitAbsensi() {
  if (!absensiSesiSaatIni) { tampilkanToast('\u274c Data sesi hilang', 'error'); return; }
  let rows = document.querySelectorAll('#tabelAbsensiBody tr');
  if (rows.length === 0) { tampilkanToast('\u26a0\ufe0f Tidak ada siswa', 'warning'); return; }

  let materi = document.getElementById('absMateri').value.trim();
  let entries = [];
  rows.forEach(tr => {
    let idSiswa = tr.getAttribute('data-id');
    let siswa = absensiSesiSaatIni.siswaList.find(x => x.id === idSiswa);
    if (!siswa) return;
    let status = tr.querySelector('.absensi-status').value;
    let catatan = tr.querySelector('.absensi-catatan').value.trim();
    let nilaiEl = tr.querySelector('.absensi-nilai');
    let nilai = (nilaiEl && nilaiEl.value !== '') ? Number(nilaiEl.value) : '';
    entries.push({ idSiswa: siswa.id, namaSiswa: siswa.nama, status: status, catatan: catatan, nilai: nilai });
  });

  let payload = {
    tanggal : absensiSesiSaatIni.tanggal,
    rombel  : absensiSesiSaatIni.rombel,
    mapel   : absensiSesiSaatIni.mapel,
    jamMulai: absensiSesiSaatIni.jamMulai,
    idGuru  : absensiSesiSaatIni.idGuru,
    namaGuru: absensiSesiSaatIni.namaGuru,
    materi  : materi,
    entries : entries
  };

  setTombolLoading('btnSimpanAbsensi', true, 'Menyimpan...');
  tampilkanLoading('Menyimpan absensi...');
  google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanAbsensi', false, '', '<i class="fas fa-save me-1"></i>Simpan Absensi', 'btn btn-info text-white w-100 fw-bold py-2');
      let tipe = res.includes('\u2705') ? 'success' : 'warning';
      tampilkanToast(res, tipe);
      if (tipe === 'success') {
        bsModalAbsensi.hide();
        // Refresh list jadwal guru kalau modal ini dibuka dari sana
        if (document.getElementById('isiAbsGuru') && document.getElementById('isiAbsGuru').value) loadJadwalGuru();
      }
    })
    .withFailureHandler(err => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanAbsensi', false, '', '<i class="fas fa-save me-1"></i>Simpan Absensi', 'btn btn-info text-white w-100 fw-bold py-2');
      tampilkanToast('\u274c Error: ' + err.message, 'error');
    })
    .simpanAbsensi(payload);
}

function initIsiAbsensi() {
  let now = new Date();
  let bulanEl = document.getElementById('isiAbsBulan');
  let tahunEl = document.getElementById('isiAbsTahun');
  if (!bulanEl.value) bulanEl.value = now.getMonth() + 1;
  if (!tahunEl.value) tahunEl.value = now.getFullYear();

  // Populate guru dropdown dari rawSchedule (distinct guru) — atau dari Guru data kalau ada
  let sel = document.getElementById('isiAbsGuru');
  if (!sel) return;
  let opts = '<option value="">-- Pilih Guru --</option>';
  let seen = {};
  (rawSchedule||[]).forEach(s => {
    if (s.idGuru && !seen[s.idGuru]) {
      seen[s.idGuru] = true;
      opts += `<option value="${s.idGuru}">${s.namaGuru} (${s.idGuru})</option>`;
    }
  });
  let currVal = sel.value;
  sel.innerHTML = opts;
  if (currVal) sel.value = currVal;

  // Kunci ke guru sendiri kalau role=guru
  if (window._guruLockId) {
    sel.value = window._guruLockId;
    sel.disabled = true;
    loadJadwalGuru();
  }
}

function loadJadwalGuru() {
  let idGuru = document.getElementById('isiAbsGuru').value;
  let bulan  = parseInt(document.getElementById('isiAbsBulan').value);
  let tahun  = parseInt(document.getElementById('isiAbsTahun').value);
  let tbody = document.getElementById('tabelJadwalGuruBody');
  if (!idGuru) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Pilih guru &amp; bulan untuk lihat jadwal</td></tr>';
    return;
  }
  // Filter rawSchedule by guru + bulan + tahun
  let list = (rawSchedule||[]).filter(s => {
    if ((s.idGuru||'') !== idGuru) return false;
    if (!s.tgl) return false;
    let d = new Date(s.tgl);
    if (isNaN(d.getTime())) return false;
    return (d.getMonth()+1) === bulan && d.getFullYear() === tahun;
  }).sort((a,b) => {
    let da = new Date(a.tgl), db = new Date(b.tgl);
    if (da - db !== 0) return da - db;
    return (a.jamMulai||'').localeCompare(b.jamMulai||'');
  });

  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Tidak ada jadwal untuk periode ini</td></tr>';
    return;
  }

  // Tampilkan dulu tanpa status, lalu fetch status absensi
  tbody.innerHTML = list.map(s => {
    let tglStr = (s.tgl||'').split('T')[0];
    return `<tr><td>${tglStr}</td><td>${s.jamMulai}</td><td><strong>${s.kelas}</strong></td><td>${s.mapel}</td><td class="text-center" data-status-cell="${tglStr}|${s.kelas.toLowerCase()}|${s.jamMulai}"><span class="badge bg-secondary">memuat...</span></td><td class="text-center"><button class="btn btn-sm btn-info text-white fw-bold" onclick='bukaModalIsiAbsensi(${JSON.stringify(s).replace(/'/g,"&#39;")})'><i class="fas fa-edit me-1"></i>Isi/Edit</button></td></tr>`;
  }).join('');

  // Fetch status bulk
  google.script.run
    .withSuccessHandler(statusMap => {
      document.querySelectorAll('[data-status-cell]').forEach(td => {
        let key = td.getAttribute('data-status-cell');
        let st = statusMap[key];
        if (st && st.jumlahTotal > 0) {
          td.innerHTML = `<span class="badge bg-success">Sudah (${st.jumlahHadir}/${st.jumlahTotal} hadir)</span>`;
        } else {
          td.innerHTML = `<span class="badge bg-warning text-dark">Belum diabsen</span>`;
        }
      });
    })
    .withFailureHandler(err => {
      document.querySelectorAll('[data-status-cell]').forEach(td => { td.innerHTML = '<span class="badge bg-secondary">?</span>'; });
    })
    .getStatusAbsensiBulkSesi(idGuru, bulan, tahun);
}

function autoFillHonorSesi() {
  let mapel = document.getElementById('sMapel').value.trim();
  let rombel = document.getElementById('sKelas').value.trim();
  let tingkat = getTingkatFromRombel(rombel);
  let tipeEl = document.querySelector('input[name="sTipeSesi"]:checked');
  let tipe   = tipeEl ? tipeEl.value : 'Offline';
  let el = document.getElementById('sHonorInfo');
  if (!mapel || !rombel) { el.innerHTML = '-'; return; }
  let entry = rawMapel.find(m => m.mapel.toLowerCase() === mapel.toLowerCase() && (m.kelas||'').toLowerCase() === tingkat.toLowerCase());
  if (entry) {
    let honor = (tipe === 'Online') ? entry.honorOnline : entry.honorOffline;
    let lainHonor = (tipe === 'Online') ? entry.honorOffline : entry.honorOnline;
    let lainLabel = (tipe === 'Online') ? 'Offline' : 'Online';
    el.innerHTML = '<span class="fw-bold text-success">Rp ' + honor.toLocaleString('id-ID') + '</span> <span class="text-muted">/ sesi (' + tipe + ', tingkat ' + tingkat + ')</span>' +
                   '<br><span class="text-muted small">' + lainLabel + ': Rp ' + lainHonor.toLocaleString('id-ID') + '</span>';
  } else {
    el.innerHTML = '<span class="text-warning small fw-bold">\u26a0\ufe0f Honor untuk ' + mapel + ' tingkat ' + tingkat + ' belum diatur</span>';
  }
}
function submitSchedule() {
  let idGuru = document.getElementById('sGuruSearch').value.split(' - ')[0].trim();
  let tipeEl = document.querySelector('input[name="sTipeSesi"]:checked');
  let payload = {
    rowIndex: document.getElementById('sRowIndexHidden').value,
    tgl: document.getElementById('sTanggal').value,
    jamMulai: document.getElementById('sJamMulai').value,
    jamBerakhir: document.getElementById('sJamBerakhir').value,
    durasi: document.getElementById('sDurasi').value,
    ruangan: document.getElementById('sRuangan').value,
    kelas: document.getElementById('sKelas').value,
    mapel: document.getElementById('sMapel').value,
    idGuru: idGuru,
    namaGuru: document.getElementById('sNamaGuru').value,
    tipeSesi: tipeEl ? tipeEl.value : 'Offline'
  };
  if (!payload.tgl || !payload.kelas || !payload.mapel || !payload.idGuru) {
    tampilkanToast('Tanggal, Kelas, Mata Pelajaran, dan Guru wajib diisi!', 'warning'); return;
  }

  // ── Validasi combobox: value harus ada di datalist (data validation) ──
  if (!isValidComboValue('sKelas'))      { tampilkanToast('\u26a0\ufe0f Kelas tidak valid! Pilih dari daftar suggestion.','warning');           return; }
  if (!isValidComboValue('sMapel'))      { tampilkanToast('\u26a0\ufe0f Mata Pelajaran tidak valid! Pilih dari daftar suggestion.','warning'); return; }
  if (!isValidComboValue('sRuangan'))    { tampilkanToast('\u26a0\ufe0f Ruangan tidak valid! Pilih dari daftar suggestion.','warning');         return; }
  if (!isValidComboValue('sGuruSearch')) { tampilkanToast('\u26a0\ufe0f Guru tidak valid! Pilih dari daftar suggestion.','warning');           return; }

  // ── CEK KONFLIK ruangan/waktu sebelum simpan ──
  let excludeRow = payload.rowIndex ? parseInt(payload.rowIndex) : null;
  let konflik = cekKonflik(payload.ruangan, payload.tgl, payload.jamMulai, payload.jamBerakhir, excludeRow);
  if (konflik.length > 0) {
    let info = konflik.map(k => `"${k.mapel} ${k.kelas}" oleh ${k.namaGuru} (${k.jamMulai}-${k.jamBerakhir})`).join('\n');
    if (!confirm('⚠️ KONFLIK JADWAL di ruangan "' + payload.ruangan + '"!\n\n' + info + '\n\nLanjutkan? Jadwal lama akan dihapus otomatis.')) return;
    // Hapus jadwal konflik dulu, lalu lanjut simpan
    let konflikRows = konflik.map(k => k.rowIndex);
    let toDel = [...konflikRows];
    let doSimpan = () => doSimpanSchedule(payload);
    function hapusBerikutnya() {
      if (toDel.length === 0) { doSimpan(); return; }
      let row = toDel.shift();
      google.script.run
        .withSuccessHandler(() => { scheduleDataLoaded=false; hapusBerikutnya(); })
        .withFailureHandler(() => hapusBerikutnya())
        .hapusSchedule(row);
    }
    setTombolLoading('btnSimpanSchedule', true, 'Menghapus konflik...');
    tampilkanLoading('Menghapus jadwal konflik...');
    hapusBerikutnya();
    return;
  }
  doSimpanSchedule(payload);
}

function doSimpanSchedule(payload) {
  setTombolLoading('btnSimpanSchedule', true, 'Menyimpan...');
  tampilkanLoading('Menyimpan jadwal...');
  google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      // Handle konflik response dari backend
      if (res.indexOf('\u26a0\ufe0fKONFLIK\u26a0\ufe0f') === 0) {
        let detail = res.replace('\u26a0\ufe0fKONFLIK\u26a0\ufe0f', '').trim();
        let msg = '\u26a0\ufe0f KONFLIK JADWAL terdeteksi!\n\n' + detail + '\n\nLanjutkan? Jadwal lama akan dihapus dan diganti.';
        setTombolLoading('btnSimpanSchedule', false, '', 'Simpan Jadwal', 'btn btn-success w-100 fw-bold py-2');
        if (confirm(msg)) {
          payload.forceOverwrite = true;
          doSimpanSchedule(payload);   // retry sekali
        }
        return;
      }
      setTombolLoading('btnSimpanSchedule', false, '', 'Simpan Jadwal', 'btn btn-success w-100 fw-bold py-2');
      let tipe = res.includes('\u2705') ? 'success' : 'warning';
      tampilkanToast(res, tipe);
      if (tipe === 'success') {
        if (payload.ruangan && !calendarRooms.includes(payload.ruangan)) calendarRooms.push(payload.ruangan);
        bsModalSchedule.hide();
        resetFormScheduleKeDefault();
        scheduleDataLoaded = false;
        fetchScheduleData(function() { renderCalendar(); });
      }
    })
    .withFailureHandler(err => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanSchedule', false, '', 'Simpan Jadwal', 'btn btn-success w-100 fw-bold py-2');
      tampilkanToast('\u274c Error: ' + err.message, 'error');
    })
    .simpanSchedule(payload);
}
function konfirmasiHapusSchedule(rowIndex) {
  if (!confirm('Hapus jadwal ini secara permanen?')) return;
  tampilkanLoading('Menghapus jadwal...');
  google.script.run
    .withSuccessHandler(res => { sembunyikanLoading(); tampilkanToast(res, 'success'); scheduleDataLoaded = false; fetchScheduleData(); })
    .withFailureHandler(err => { sembunyikanLoading(); tampilkanToast('\u274c ' + err.message, 'error'); })
    .hapusSchedule(rowIndex);
}

// ── KELOLA RUANGAN (kalender) ──
function bukaModalKelolaRuangan() {
  if (!bsModalRuangan) bsModalRuangan = new bootstrap.Modal(document.getElementById('modalRuangan'));
  renderRuanganList();
  bsModalRuangan.show();
}
function renderRuanganList() {
  let html = '';
  if (calendarRooms.length === 0) {
    html = '<p class="text-muted small fst-italic">Belum ada ruangan. Tambahkan di bawah atau dari menu Data Ruangan.</p>';
  } else {
    calendarRooms.forEach((room, i) => {
      html += '<div class="d-flex align-items-center justify-content-between mb-2 px-3 py-2 rounded-3" style="background:#f8fafc;border:1px solid #e2e8f0;">';
      html += '<span class="fw-bold small"><i class="fas fa-door-open me-2" style="color:#94a3b8;"></i>' + room + '</span>';
      html += '<div class="d-flex gap-1">';
      if (i > 0) html += '<button class="btn btn-sm btn-light py-0 px-1" onclick="moveRoom(' + i + ',-1)"><i class="fas fa-arrow-up" style="font-size:10px;"></i></button>';
      if (i < calendarRooms.length - 1) html += '<button class="btn btn-sm btn-light py-0 px-1" onclick="moveRoom(' + i + ',1)"><i class="fas fa-arrow-down" style="font-size:10px;"></i></button>';
      html += '<button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="hapusRuangan(' + i + ')" style="border-radius:6px;"><i class="fas fa-times" style="font-size:10px;"></i></button>';
      html += '</div></div>';
    });
  }
  document.getElementById('ruanganList').innerHTML = html;
}
function tambahRuanganBaru() {
  let v = document.getElementById('newRuanganInput').value.trim();
  if (!v) { tampilkanToast('Nama ruangan tidak boleh kosong!', 'warning'); return; }
  if (calendarRooms.includes(v)) { tampilkanToast('Ruangan sudah ada!', 'warning'); return; }
  calendarRooms.push(v);
  document.getElementById('newRuanganInput').value = '';
  renderRuanganList();
}
function hapusRuangan(idx) {
  if (!confirm('Hapus ruangan "' + calendarRooms[idx] + '" dari tampilan kalender?')) return;
  calendarRooms.splice(idx, 1);
  renderRuanganList();
}
function moveRoom(idx, dir) {
  let t = idx + dir;
  if (t < 0 || t >= calendarRooms.length) return;
  let tmp = calendarRooms[idx];
  calendarRooms[idx] = calendarRooms[t];
  calendarRooms[t] = tmp;
  renderRuanganList();
}

  // Kalau element ini <input list="...">, populate datalist-nya

  jenjangSistem.forEach(j => j.daftar.forEach(cls => { html += `<option value="${cls}">${cls}</option>`; }));

// Cari guru yang mengajar kelas DAN mapel tertentu
function getGuruByKelasMapel(kelas, mapel) {
  // kelas dari schedule = rombel (10A) → derive ke tingkat (10).
  // kelas guru juga dinormalisasi ke tingkat, supaya cocok lintas format (rombel/tingkat/lama).
  let targetTingkat = kelas ? getTingkatFromRombel(kelas).toLowerCase() : '';
  return rawGuru.filter(g => {
    let kelasList = (g.kelas || '').split(',').map(k => getTingkatFromRombel(k.trim()).toLowerCase());
    let mapelMatch = !mapel || (g.mapel || '').toLowerCase() === mapel.toLowerCase();
    let kelasMatch = !targetTingkat || kelasList.includes(targetTingkat);
    return mapelMatch && kelasMatch;
  });
}

// Update datalist guru sesuai filter kelas+mapel (unique per ID)
function updateGuruDatalistFiltered(datalistId, kelas, mapel) {

  });
  dl.innerHTML = opts;
}

// Helper: set nilai input/select dengan aman (handle both)
function setSelectValueSafe(elId, value) {
  let el = document.getElementById(elId);
  if (!el || !value) return;
  if (el.tagName === 'INPUT') {
    // Untuk input+datalist: cukup set value, tidak perlu tambah option
    el.value = value;
    return;
  }
  // Untuk <select>: tambahkan option kalau belum ada (data legacy)
  let found = false;
  for (let opt of el.options) { if (opt.value === value) { found = true; break; } }
  if (!found) {
    let opt = document.createElement('option');
    opt.value = value;
    opt.text  = value + ' (data lama)';
    el.add(opt);
  }
  el.value = value;
}

// Helper: validasi value input thd datalist-nya. Return true kalau valid (atau kosong).
function isValidComboValue(inputId) {
  let el = document.getElementById(inputId);
  if (!el) return true;
  if (el.tagName !== 'INPUT') return true;  // bukan combobox
  let dlId = el.getAttribute('list');
  if (!dlId) return true;
  let dl = document.getElementById(dlId);
  if (!dl) return true;
  let val = (el.value || '').trim();
  if (!val) return true;   // empty handled by required validation
  let opts = dl.querySelectorAll('option');
  for (let opt of opts) {
    if (opt.value.toLowerCase() === val.toLowerCase()) {
      el.value = opt.value;   // normalize ke value canonical (case match)
      return true;
    }
  }
  return false;
}

// Render badge kelas guru sebagai "Tingkat X" (normalisasi semua format, deteksi data korup)
function renderKelasTingkatBadges(kelasStr) {
  if (!kelasStr) return '<span class="text-muted small">-</span>';
  let s = kelasStr.toString();
  // Deteksi data korup (cell terlanjur jadi tanggal oleh Google Sheets)
  if (/GMT|\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b|\b\d{4}\b.*\d{2}:\d{2}/.test(s)) {
    return '<span class="badge bg-danger" title="Data tingkat rusak (jadi tanggal). Edit guru ini lalu Simpan ulang.">\u26a0 perlu diperbaiki</span>';
  }
  let seen = new Set(), tingkats = [];
  s.split(',').map(k => k.trim()).filter(k => k).forEach(k => {
    let t = getTingkatFromRombel(k);
    if (t && !seen.has(t)) { seen.add(t); tingkats.push(t); }
  });
  if (tingkats.length === 0) return '<span class="text-muted small">-</span>';
  return tingkats.map(t => `<span class="badge bg-light text-dark border me-1 mb-1">Tingkat ${t}</span>`).join('');
}

function renderTabelGuru() {
  let limitVal  = document.getElementById('limitGuru').value;
  let totalData = filteredGuruData.length;
  let startIdx = 0, endIdx = totalData, totalPages = 1;
  if (limitVal !== 'all') {
    let limit = parseInt(limitVal);
    totalPages = Math.ceil(totalData / limit) || 1;
    if (currentPageGuru < 1) currentPageGuru = 1;
    if (currentPageGuru > totalPages) currentPageGuru = totalPages;
    startIdx = (currentPageGuru - 1) * limit;
    endIdx   = Math.min(startIdx + limit, totalData);
    document.getElementById('btnPrevGuru').disabled = (currentPageGuru === 1);
    document.getElementById('btnNextGuru').disabled = (currentPageGuru === totalPages);
    document.getElementById('txtPageGuru').innerText = `Halaman ${currentPageGuru} dari ${totalPages}`;
  } else {
    document.getElementById('btnPrevGuru').disabled = true;
    document.getElementById('btnNextGuru').disabled = true;
    document.getElementById('txtPageGuru').innerText = 'Menampilkan Semua';
  }
  document.getElementById('infoGuruCount').innerText = `Menampilkan ${totalData > 0 ? startIdx+1 : 0}-${endIdx} dari ${totalData} data`;

  let pageData = filteredGuruData.slice(startIdx, endIdx);
  // Group by teacher ID
  let grouped = {};

  pageData.forEach(g => {
    if (!grouped[g.id]) { grouped[g.id] = []; order.push(g.id); }
    grouped[g.id].push(g);
  });

  let html = '';
  order.forEach(id => {
    let rows = grouped[id];
    let namaGuru = rows[0].nama;
    let namaEsc = namaGuru.replace(/'/g, "\\'");
    rows.forEach((g, idx) => {
      html += `<tr>`;

        html += `<td rowspan="${rows.length}" class="align-middle fw-bold">${g.nama}</td>`;
      }
      html += `<td class="align-middle">${g.mapel}</td>`;
      html += `<td class="align-middle">${renderKelasTingkatBadges(g.kelas)}</td>`;
      if (idx === 0) {
        html += `<td rowspan="${rows.length}" class="text-center align-middle">
          <div class="d-flex gap-1 justify-content-center">
            <button class="btn btn-sm btn-outline-primary py-0" onclick="siapkanEditGuruById('${id}')"><i class="fas fa-edit me-1"></i>Edit</button>
            <button class="btn btn-sm btn-outline-danger py-0" onclick="konfirmasiHapusGuruById('${id}','${namaEsc}')"><i class="fas fa-trash-alt me-1"></i>Hapus</button>
          </div>
        </td>`;
      }
      html += `</tr>`;
    });
  });
  document.getElementById('tabelGuruBody').innerHTML = html ||

function getCalBlockPos(jamMulai, jamBerakhir) {
  if (!jamMulai || !jamBerakhir) return null;
  let t1 = parseJamRobust(jamMulai);
  let t2 = parseJamRobust(jamBerakhir);
  if (!t1 || !t2) return null;
  let sm = (t1.h - CAL_START_HOUR)*60 + t1.m;
  let em = (t2.h - CAL_START_HOUR)*60 + t2.m;
  return { t: sm/60*CAL_HOUR_PX, h: Math.max((em-sm)/60*CAL_HOUR_PX, 16) };
}

// Parser jam yang tahan terhadap format "HH:MM", "H:MM", atau Date string
function parseJamRobust(val) {
  if (!val) return null;
  let s = val.toString().trim();
  let m = s.match(/(\d{1,2}):(\d{2})/);
  if (m) {
    let h = parseInt(m[1]), mn = parseInt(m[2]);
    if (h >= 0 && h <= 23 && mn >= 0 && mn <= 59) return { h: h, m: mn };
  }
  let d = new Date(s);
  if (!isNaN(d.getTime())) return { h: d.getHours(), m: d.getMinutes() };
  return null;
}

let currentUser = null;

function cekAksesLaluMulai() {
  tampilkanLoading('Memeriksa akses...');
  google.script.run
    .withSuccessHandler(function(user) {
      sembunyikanLoading();
      currentUser = user;
      if (!user || user.role === 'none' || !user.modulList || user.modulList.length === 0) {
        tampilkanLockedScreen(user);
        return;
      }
      applyAksesControl(user);
      fetchData();
      fetchMasterData();
    })
    .withFailureHandler(function(err) {
      sembunyikanLoading();
      tampilkanLockedScreen({ pesan: 'error', email: '', errMsg: err.message });
    })
    .getCurrentUserAkses();
}

function tampilkanLockedScreen(user) {
  let scr = document.getElementById('lockedScreen');
  let msg = document.getElementById('lockedScreenMsg');
  let emailEl = document.getElementById('lockedScreenEmail');
  if (user && user.pesan === 'no_email') {
    msg.innerHTML = 'Sistem tidak bisa membaca akun Google kamu. Pastikan Web App di-deploy dengan setting <strong>"Execute as: User accessing the web app"</strong>, lalu buka ulang.';
  } else if (user && user.pesan === 'error') {
    msg.innerHTML = 'Terjadi error saat memeriksa akses: ' + (user.errMsg || '') + '. Coba lagi atau hubungi admin.';
  } else if (user && user.status && user.status.toLowerCase() === 'nonaktif') {
    msg.innerHTML = 'Akses kamu sedang <strong>dinonaktifkan</strong>. Hubungi management untuk diaktifkan kembali.';
  } else {
    msg.innerHTML = 'Email kamu belum terdaftar untuk mengakses dashboard ini. Hubungi management untuk diberikan akses.';
  }
  if (user && user.email) emailEl.innerText = 'Login sebagai: ' + user.email;
  scr.style.display = 'flex';
}

function applyAksesControl(user) {
  // Map modul → nav id
  let navMap = {
    'dashboard':'nav-dashboard','data-siswa':'nav-data-siswa','data-pembayaran':'nav-data-pembayaran',
    'data-guru':'nav-data-guru','schedule':'nav-schedule','absensi':'nav-absensi',
    'rekap-honor':'nav-rekap-honor','data-mapel':'nav-data-mapel','data-kelas':'nav-data-kelas',
    'data-ruangan':'nav-data-ruangan','manajemen-akses':'nav-manajemen-akses'
  };
  let allowed = user.modulList || [];
  // Sembunyikan semua nav dulu, lalu tampilkan yang diizinkan
  Object.keys(navMap).forEach(modul => {
    let el = document.getElementById(navMap[modul]);
    if (!el) return;
    if (allowed.includes(modul)) {
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  });

  // Info user di sidebar
  let infoWrap = document.getElementById('sidebarUserInfo');
  if (infoWrap) {
    infoWrap.style.display = 'block';
    let roleLabel = { management:'Management', staff:'Staff', guru:'Guru' }[user.role] || user.role;
    document.getElementById('userInfoNama').innerText = user.nama || user.email;
    document.getElementById('userInfoRole').innerText = roleLabel + (user.idGuru ? ' \u00b7 ' + user.idGuru : '');
  }

  // Pindah ke view pertama yang diizinkan (kalau dashboard ga boleh)
  let firstView = allowed[0];
  if (firstView) switchView(firstView);

  // Khusus guru: kunci picker guru di Isi Absensi ke dirinya
  if (user.role === 'guru' && user.idGuru) {
    window._guruLockId = user.idGuru;
  }
}

function bolehAkses(modul) {
  if (!currentUser || !currentUser.modulList) return false;
  return currentUser.modulList.includes(modul);
}

function resetFormAkses() {
  document.getElementById('formAkses').reset();
  document.getElementById('aRowIndexHidden').value = '';
  document.getElementById('txtJudulFormAkses').innerText = 'Tambah Akses';
  document.getElementById('btnSimpanAkses').innerText = 'Simpan';
  document.getElementById('btnSimpanAkses').className = 'btn btn-primary w-100 fw-bold py-2';
  onAksesRoleChange();
}
function submitAkses() {
  let payload = {
    rowIndex: document.getElementById('aRowIndexHidden').value,
    email   : document.getElementById('aEmail').value.trim(),
    nama    : document.getElementById('aNama').value.trim(),
    role    : document.getElementById('aRole').value,
    idGuru  : document.getElementById('aIDGuru').value.trim(),
    status  : document.getElementById('aStatus').value
  };
  if (!payload.email) { tampilkanToast('Email wajib diisi!', 'warning'); return; }
  if (payload.role === 'guru') {
    if (!payload.idGuru) {
      if (!confirm('Role guru tanpa ID Guru — Isi Absensi tidak akan auto-filter. Lanjut?')) return;
    } else if (!isIDGuruValid(payload.idGuru)) {
      tampilkanToast('\u26a0\ufe0f ID Guru "' + payload.idGuru + '" tidak valid! Pilih dari daftar suggestion.', 'warning');
      return;
    }
  }
  setTombolLoading('btnSimpanAkses', true, 'Menyimpan...');
  tampilkanLoading('Menyimpan akses...');
  google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanAkses', false, '', 'Simpan', 'btn btn-primary w-100 fw-bold py-2');
      let tipe = res.includes('\u2705') ? 'success' : 'warning';
      tampilkanToast(res, tipe);
      if (tipe === 'success') { bsModalAkses.hide(); resetFormAkses(); renderTabelAkses(); }
    })
    .withFailureHandler(err => {
      sembunyikanLoading();
      setTombolLoading('btnSimpanAkses', false, '', 'Simpan', 'btn btn-primary w-100 fw-bold py-2');
      tampilkanToast('\u274c ' + err.message, 'error');
    })
    .simpanAkses(payload);
}
function konfirmasiHapusAkses(rowIndex, email) {
  if (!confirm('Hapus akses untuk "' + email + '"?')) return;
  tampilkanLoading('Menghapus...');
  google.script.run
    .withSuccessHandler(res => {
      sembunyikanLoading();
      tampilkanToast(res, res.includes('\u2705') ? 'success' : 'warning');
      renderTabelAkses();
    })
    .withFailureHandler(err => { sembunyikanLoading(); tampilkanToast('\u274c ' + err.message, 'error'); })
    .hapusAkses(rowIndex);
}
</script>
